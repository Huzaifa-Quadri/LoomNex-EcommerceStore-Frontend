<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LoomNex - Cart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root {
        --primary-color: #ef4444; /* Tailwind red-500 */
      }
    </style>
    <title>Cart Page</title>
  </head>
  <body class="bg-gray-50">
    <header class="flex items-center justify-between border-b px-10 py-4">
      <div class="flex items-center gap-8">
        <a
          class="flex items-center gap-3 text-2xl font-bold text-stone-800"
          href="#"
        >
          <svg
            class="h-8 w-8 text-[var(--primary-color)]"
            fill="none"
            viewBox="0 0 48 48"
          >
            <path
              d="M8.57829 8.57829C5.52816 11.6284 3.451 15.5145 2.60947 19.7452C1.76794 23.9758 2.19984 28.361 3.85056 32.3462C5.50128 36.3314 8.29667 39.7376 11.8832 42.134C15.4698 44.5305 19.6865 45.8096 24 45.8096C28.3135 45.8096 32.5302 44.5305 36.1168 42.134C39.7033 39.7375 42.4987 36.3314 44.1494 32.3462C45.8002 28.361 46.2321 23.9758 45.3905 19.7452C44.549 15.5145 42.4718 11.6284 39.4217 8.57829L24 24L8.57829 8.57829Z"
              fill="currentColor"
            ></path>
          </svg>
          LoomNex
        </a>
        <nav class="hidden items-center gap-8 md:flex">
          <a href="index.html" class="text-stone-600 hover:text-stone-900"
            >Home</a
          >
          <a href="electronics.html" class="text-stone-600 hover:text-stone-900"
            >Electronics</a
          >
          <a href="clothing.html" class="text-stone-600 hover:text-stone-900"
            >Clothing</a
          >
          <a href="#" class="text-stone-600 hover:text-stone-900">About Us</a>
        </nav>
      </div>
      <div class="flex items-center gap-4">
        <a
          href="index.html"
          class="text-sm font-medium text-[var(--primary-color)] hover:underline"
          >Continue Shopping</a
        >
        <!-- Cart counter will be updated by cart.js -->
        <div class="relative">
          <span class="text-sm text-gray-600">Cart Items:</span>
          <span id="cart-count" class="ml-1 px-2 py-1 bg-[var(--primary-color)] text-white text-xs rounded-full">0</span>
        </div>
      </div>
    </header>

    <!-- Main Cart Section -->
    <main
      class="max-w-7xl mx-auto px-6 py-10 grid grid-cols-1 lg:grid-cols-3 gap-10"
    >
      <!-- Cart Items -->
      <div class="lg:col-span-2">
        <h2 class="text-xl font-bold text-gray-900 mb-6">Shopping Cart</h2>
        <div class="divide-y divide-gray-200 bg-white rounded-lg shadow-sm">
          <!-- JS will render cart items here -->
        </div>
      </div>

      <!-- Order Summary -->
      <div class="lg:col-span-1">
        <div class="bg-white rounded-lg shadow-sm p-6">
          <!-- JS will render totals here -->
        </div>
      </div>
    </main>

    <!-- JS -->
    <script src="js/cart.js"></script>
  </body>
</html>
