<html>
  <head>
    <meta charset="utf-8" />
    <link crossorigin="" href="https://fonts.gstatic.com/" rel="preconnect" />
    <link
      as="style"
      href="https://fonts.googleapis.com/css2?display=swap&family=Plus+Jakarta+Sans:wght@400;500;600;700;800"
      onload="this.rel='stylesheet'"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
      rel="stylesheet"
    />
    <title>Clothing</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <style type="text/tailwindcss">
      :root {
        --primary-color: #ea2a33;
      }
      .radio-button:checked {
        background-image: url("data:image/svg+xml,%3csvg viewBox='0 0 16 16' fill='white' xmlns='http://www.w3.org/2000/svg'%3e%3ccircle cx='8' cy='8' r='3'/%3e%3c/svg%3e");
        background-color: var(--primary-color);
        border-color: var(--primary-color);
      }
    </style>
  </head>
  <body
    class="bg-gray-50 text-gray-800"
    style="font-family: 'Plus Jakarta Sans', sans-serif"
  >
    <div class="relative flex min-h-screen flex-col">
      <!-- 🔹 Header -->
      <header class="flex items-center justify-between border-b px-10 py-4">
        <div class="flex items-center gap-8">
          <a
            class="flex items-center gap-3 text-2xl font-bold text-stone-800"
            href="#"
          >
            <svg
              class="h-8 w-8 text-[var(--primary-color)]"
              fill="none"
              viewBox="0 0 48 48"
            >
              <path
                d="M8.57829 8.57829C5.52816 11.6284 3.451 15.5145 2.60947 19.7452C1.76794 23.9758 2.19984 28.361 3.85056 32.3462C5.50128 36.3314 8.29667 39.7376 11.8832 42.134C15.4698 44.5305 19.6865 45.8096 24 45.8096C28.3135 45.8096 32.5302 44.5305 36.1168 42.134C39.7033 39.7375 42.4987 36.3314 44.1494 32.3462C45.8002 28.361 46.2321 23.9758 45.3905 19.7452C44.549 15.5145 42.4718 11.6284 39.4217 8.57829L24 24L8.57829 8.57829Z"
                fill="currentColor"
              ></path>
            </svg>
            LoomNex
          </a>
          <nav class="hidden items-center gap-8 md:flex">
            <a href="index.html" class="text-stone-600 hover:text-stone-900"
              >Home</a
            >
            <a
              href="electronics.html"
              class="text-stone-600 hover:text-stone-900"
              >Electronics</a
            >
            <a href="clothing.html" class="text-stone-600 hover:text-stone-900"
              >Clothing</a
            >
            <a href="#" class="text-stone-600 hover:text-stone-900">About Us</a>
          </nav>
        </div>
        <div class="flex gap-2">
          <a href="cart.html">
            <button
              class="flex h-10 w-10 items-center justify-center rounded-full bg-stone-100 hover:bg-stone-200"
            >
              <span class="material-symbols-outlined">shopping_cart</span>
            </button>
          </a>
        </div>
      </header>

      <!-- 🔹 Main Section -->
      <main class="mx-auto w-full max-w-7xl px-6 py-8">
        <div class="grid grid-cols-1 md:grid-cols-[280px_1fr] gap-8">
          <!-- Sidebar Filters -->
          <aside class="space-y-6">
            <h2 class="text-2xl font-bold">Filters</h2>
            <div>
              <h3 class="text-lg font-semibold">Price</h3>
              <input
                id="priceRange"
                type="range"
                min="0"
                max="200"
                value="200"
                class="w-full h-2 bg-gray-200 rounded-lg cursor-pointer accent-[var(--primary-color)]"
              />
              <div class="flex justify-between text-sm text-gray-500 mt-2">
                <span>$0</span>
                <span id="priceValue">$200</span>
              </div>
            </div>
          </aside>

          <!-- Product Listing -->
          <div class="flex flex-col">
            <div
              class="flex flex-wrap justify-between items-baseline gap-4 pb-6"
            >
              <h1 class="text-4xl font-extrabold">Clothing</h1>
              <div class="flex border-b border-gray-200">
                <button
                  class="px-4 py-2 text-sm font-semibold border-b-2 border-[var(--primary-color)]"
                >
                  Relevance
                </button>
                <button
                  class="px-4 py-2 text-sm text-gray-500 hover:text-gray-900"
                >
                  Price
                </button>
                <button
                  class="px-4 py-2 text-sm text-gray-500 hover:text-gray-900"
                >
                  Rating
                </button>
                <button
                  class="px-4 py-2 text-sm text-gray-500 hover:text-gray-900"
                >
                  Newest
                </button>
              </div>
            </div>

            <!-- Dynamic Product Grid -->
            <div
              id="productGrid"
              class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6"
            >
              <!-- JS will inject products here -->
              <script src="js/clothing.js"></script>
            </div>
          </div>
        </div>
      </main>
    </div>
  </body>
</html>
